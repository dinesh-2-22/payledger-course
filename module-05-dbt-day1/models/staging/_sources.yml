version: 2

sources:
  - name: payledger_raw
    database: PAYLEDGER
    schema: PAYLEDGER_RAW
    description: "Raw landing tables loaded by Module 2 (generate_data.py + stage_and_copy.sql)."
    tables:
      - name: raw_transactions
        description: "One row per card transaction, as generated by Module 2."
        columns:
          - name: transaction_id
            tests:
              - unique
              - not_null
          - name: card_id
            tests:
              - not_null
          - name: merchant_id
            tests:
              - not_null

      - name: raw_gateway_log
        description: "Payment gateway events (approvals, declines, retries) per transaction."
        columns:
          - name: gateway_log_id
            tests:
              - unique
              - not_null
          - name: transaction_id
            tests:
              - not_null

      - name: raw_card_master
        description: "Card master data, ~800 cards."
        columns:
          - name: card_id
            tests:
              - unique
              - not_null

      - name: raw_merchant_master
        description: "Merchant master data, ~60 merchants."
        columns:
          - name: merchant_id
            tests:
              - unique
              - not_null

      - name: dispute_memos
        description: "Free-text customer dispute narratives, ~200 rows. Used later by Cortex Search (Module 10)."
        columns:
          - name: dispute_id
            tests:
              - unique
              - not_null
          - name: transaction_id
            tests:
              - not_null
